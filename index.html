  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(11,31,58,0.55) 0%,
      rgba(11,31,58,0.45) 40%,
      rgba(11,31,58,0.82) 70%,
      rgba(11,31,58,0.97) 100%
    );
  }

  /* Grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* HERO */
  .hero {
    position: relative;
    z-index: 2;
    padding: 3.2rem 1.8rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .hero-tag {
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    color: var(--dim);
    text-transform: uppercase;
    opacity: 0;
    animation: up 0.8s 0.2s forwards;
  }
  .hero-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5.5rem, 28vw, 8rem);
    line-height: 0.9;
    letter-spacing: -0.01em;
    opacity: 0;
    animation: up 0.8s 0.35s forwards;
    text-shadow: 0 4px 40px rgba(0,0,0,0.4);
  }
  .hero-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, var(--dim), transparent);
    margin-top: 1rem;
    opacity: 0;
    animation: up 0.8s 0.5s forwards;
  }

  /* SECTION */
  .section {
    position: relative;
    z-index: 2;
    padding: 0 1.8rem;
  }
  .section-label {
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    color: var(--dim);
    text-transform: uppercase;
    padding: 1.2rem 0 0.8rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    animation: up 0.8s 0.6s forwards;
  }
  .section-label::before {
    content: '';
    display: block;
    width: 20px; height: 1px;
    background: var(--dim);
    flex-shrink: 0;
  }

  /* LINKS */
  .links {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--faint);
  }
  .link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 0;
    border-bottom: 1px solid var(--faint);
    text-decoration: none;
    color: var(--white);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: up 0.7s forwards;
    -webkit-tap-highlight-color: transparent;
  }
  .link:nth-child(1){animation-delay:0.7s}
  .link:nth-child(2){animation-delay:0.82s}
  .link:nth-child(3){animation-delay:0.94s}
  .link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--faint);
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  .link:active::before { transform: translateX(0); }
  .link-left {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    position: relative;
    z-index: 1;
  }
